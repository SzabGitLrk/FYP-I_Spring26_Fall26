name: university_point_locator
description: "University Point Locator App for Larkana"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

# ✅ DEPENDENCIES SECTION - AT ROOT LEVEL
dependencies:
  flutter:
    sdk: flutter

  # UI Icons
  cupertino_icons: ^1.0.8
  
  # Supabase
  supabase_flutter: ^2.12.0
  supabase_auth_ui: ^0.5.5
  
  # Google Maps
  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.5.4
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Device info
  device_info_plus: ^10.0.0
  
  # Local notifications (no Firebase needed)
  flutter_local_notifications: ^18.0.0

  # Google Sign-In
  google_sign_in: ^6.3.0
  
  # For opening URLs
  url_launcher: ^6.3.1
  
  # Deep linking - ADDED HERE (inside dependencies, NOT inside flutter)
  app_links: ^6.0.0

# ✅ DEV DEPENDENCIES SECTION
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.14.3"

# ✅ FLUTTER LAUNCHER ICONS CONFIGURATION - AT ROOT LEVEL
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

# ✅ FLUTTER SECTION - ONLY ASSETS, FONTS, AND FLUTTER CONFIG
flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont.ttf