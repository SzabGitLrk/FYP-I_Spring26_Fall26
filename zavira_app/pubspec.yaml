name: zavira_app
description: Zavira - Women Safety & Emergency App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  geocoding: ^3.0.0
  #  Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0

  #  Location
  geolocator: ^11.0.0

  # 🗺 OpenStreetMap
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_tile_caching: ^9.0.0

  #  Open Links (Call, SMS, WhatsApp, Maps)
  url_launcher: ^6.2.5

  #  Deep Linking
  app_links: ^3.4.5

  #  Permissions
  permission_handler: ^11.3.0

  #  Date & Time
  intl: ^0.19.0

  # Icons
  font_awesome_flutter: ^10.7.0
  battery_plus: ^7.0.0
  audioplayers: ^6.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  #  App Icon Generator
  flutter_launcher_icons: ^0.13.1

#  App Icon Setup
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/zavira_logo.jpg"
flutter:
  uses-material-design: true

  assets:
    - assets/zavira_logo.jpg
    - assets/alarm.mp3